<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concrete Calculator — Free Concrete Estimator | RenoPlot</title>
  <meta name="description" content="Free concrete calculator for slabs, footings, columns, and steps. Get instant estimates in cubic yards, cubic meters, and number of bags. Waste factor included.">
  <link rel="stylesheet" href="../style.css">
  <style>
    .toggle-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .toggle-btn {
      padding: 10px;
      border: none;
      background: var(--white);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-btn.active {
      background: var(--primary);
      color: var(--white);
    }
    .shape-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .shape-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 12px 8px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--white);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .shape-btn.active {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    .shape-btn:hover:not(.active) {
      border-color: #bfdbfe;
      background: #f0f7ff;
    }
    .shape-icon { font-size: 18px; }
    .disclaimer {
      margin-top: 20px;
      padding: 12px 16px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      color: #1e40af;
      line-height: 1.55;
    }
  </style>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KJE6FNPN32"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KJE6FNPN32');
  </script>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <span class="logo-icon">🏠</span>
        <span class="logo-text">RenoPlot</span>
      </a>
      <span class="header-tagline">Free Home Improvement Calculators</span>
    </div>
  </header>

  <main class="calc-page">

    <nav class="breadcrumb">
      <a href="../index.html">Home</a>
      <span>›</span>
      <span>Concrete Calculator</span>
    </nav>

    <div class="calc-page-header">
      <h1 class="calc-page-title">Concrete Calculator</h1>
      <p class="calc-page-desc">Enter your project dimensions to estimate how much concrete you need — in cubic yards, cubic meters, and number of bags.</p>
    </div>

    <div class="calc-panels">

      <!-- LEFT PANEL -->
      <div class="panel">
        <div class="panel-title">Project Details</div>

        <div class="field">
          <label>Unit System</label>
          <div class="toggle-group">
            <button class="toggle-btn active" id="btn-imperial" onclick="setUnit('imperial')">Feet &amp; Inches</button>
            <button class="toggle-btn" id="btn-metric" onclick="setUnit('metric')">Meters</button>
          </div>
        </div>

        <div class="field">
          <label>Shape</label>
          <div class="shape-grid">
            <button class="shape-btn active" id="shape-slab" onclick="setShape('slab')">
              <span class="shape-icon">⬜</span>Slab
            </button>
            <button class="shape-btn" id="shape-footing" onclick="setShape('footing')">
              <span class="shape-icon">▬</span>Footing
            </button>
            <button class="shape-btn" id="shape-column" onclick="setShape('column')">
              <span class="shape-icon">⚫</span>Column
            </button>
            <button class="shape-btn" id="shape-steps" onclick="setShape('steps')">
              <span class="shape-icon">🪜</span>Steps
            </button>
          </div>
        </div>

        <!-- Slab -->
        <div id="inputs-slab">
          <div class="field-row">
            <div class="field">
              <label id="label-slab-length">Length (ft)</label>
              <input type="number" id="slab-length" placeholder="e.g. 12" min="0">
            </div>
            <div class="field">
              <label id="label-slab-width">Width (ft)</label>
              <input type="number" id="slab-width" placeholder="e.g. 10" min="0">
            </div>
          </div>
          <div class="field">
            <label id="label-slab-thickness">Thickness (in)</label>
            <input type="number" id="slab-thickness" placeholder="e.g. 4" min="0">
          </div>
        </div>

        <!-- Footing -->
        <div id="inputs-footing" style="display:none;">
          <div class="field-row">
            <div class="field">
              <label id="label-footing-length">Length (ft)</label>
              <input type="number" id="footing-length" placeholder="e.g. 20" min="0">
            </div>
            <div class="field">
              <label id="label-footing-width">Width (ft)</label>
              <input type="number" id="footing-width" placeholder="e.g. 2" min="0">
            </div>
          </div>
          <div class="field">
            <label id="label-footing-depth">Depth (in)</label>
            <input type="number" id="footing-depth" placeholder="e.g. 12" min="0">
          </div>
        </div>

        <!-- Column -->
        <div id="inputs-column" style="display:none;">
          <div class="field-row">
            <div class="field">
              <label id="label-column-diameter">Diameter
